services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
    environment:
      - ENVIRONMENT=development
      - WATCHFILES_FORCE_POLLING=true
      - MOCK_EXTERNAL_APIs=false           # <-- Turn the mock OFF so we hit the real APIs
      - GEMINI_API_KEY=AQ.Ab8RN6JzLfkRQ6ynXuFSxiCyGR4aPmYq7C4Wu2ovHBmcwnx_cg
      - ALPHA_VANTAGE_API_KEY=0HU9Y8FF6OTW3436

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.mjs:/app/postcss.config.mjs
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
